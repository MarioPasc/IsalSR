# IsalSR Model-Based Experiments for Picasso HPC
# ================================================
#
# Central config for experiments/models/ pipeline.
# Separate from slurm/config.yaml (which targets experiments/scripts/).
#
# Each experiment runs paired comparisons: baseline vs IsalSR.
# Parallelization: one array task per (problem, seed) pair.
# Array size = n_problems * n_seeds.

# Paths
repo_dir: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/IsalSR
results_dir: /mnt/home/users/tic_163_uma/mpascual/execs/isalsr/models
conda_env: isalsr

# SLURM defaults
constraint: cpu
account: tic_163_uma

experiments:
  # =========================================================
  # UDFS on Nguyen (12 problems x 30 seeds = 360 tasks/group)
  # =========================================================
  udfs_nguyen_baseline:
    enabled: true
    method: udfs
    benchmark: nguyen
    variant: baseline
    config: experiments/configs/udfs_nguyen.yaml
    n_seeds: 30
    n_problems: 12
    time_limit: "01:30:00"    # ~1h typical for UDFS + 30min buffer
    cpus: 1
    mem_gb: 8

  udfs_nguyen_isalsr:
    enabled: true
    method: udfs
    benchmark: nguyen
    variant: isalsr
    config: experiments/configs/udfs_nguyen.yaml
    n_seeds: 30
    n_problems: 12
    time_limit: "02:00:00"    # canonicalization overhead
    cpus: 1
    mem_gb: 8

  # =========================================================
  # Bingo on Nguyen (12 problems x 30 seeds = 360 tasks/group)
  # =========================================================
  bingo_nguyen_baseline:
    enabled: true
    method: bingo
    benchmark: nguyen
    variant: baseline
    config: experiments/configs/bingo_nguyen.yaml
    n_seeds: 30
    n_problems: 12
    time_limit: "01:00:00"    # ~30min evolution + buffer for startup/translation
    cpus: 1
    mem_gb: 12

  bingo_nguyen_isalsr:
    enabled: true
    method: bingo
    benchmark: nguyen
    variant: isalsr
    config: experiments/configs/bingo_nguyen.yaml
    n_seeds: 30
    n_problems: 12
    time_limit: "01:30:00"    # canonicalization overhead + buffer
    cpus: 1
    mem_gb: 12

  # =========================================================
  # UDFS on Feynman (10 problems x 30 seeds = 300 tasks/group)
  # =========================================================
  udfs_feynman_baseline:
    enabled: true
    method: udfs
    benchmark: feynman
    variant: baseline
    config: experiments/configs/udfs_feynman.yaml
    n_seeds: 30
    n_problems: 10
    time_limit: "01:30:00"
    cpus: 1
    mem_gb: 8

  udfs_feynman_isalsr:
    enabled: true
    method: udfs
    benchmark: feynman
    variant: isalsr
    config: experiments/configs/udfs_feynman.yaml
    n_seeds: 30
    n_problems: 10
    time_limit: "02:00:00"
    cpus: 1
    mem_gb: 8

  # =========================================================
  # Bingo on Feynman (10 problems x 30 seeds = 300 tasks/group)
  # =========================================================
  bingo_feynman_baseline:
    enabled: true
    method: bingo
    benchmark: feynman
    variant: baseline
    config: experiments/configs/bingo_feynman.yaml
    n_seeds: 30
    n_problems: 10
    time_limit: "01:00:00"    # ~30min evolution + buffer for startup/translation
    cpus: 1
    mem_gb: 12

  bingo_feynman_isalsr:
    enabled: true
    method: bingo
    benchmark: feynman
    variant: isalsr
    config: experiments/configs/bingo_feynman.yaml
    n_seeds: 30
    n_problems: 10
    time_limit: "01:30:00"    # canonicalization overhead + buffer
    cpus: 1
    mem_gb: 12

  # =========================================================
  # Debug: sequential test of all (method, benchmark) combos
  # =========================================================
  # Runs 1 seed x 1 problem x 2 variants for each of 4 (method, benchmark)
  # combinations. Use to verify the pipeline works before full submission.
  models_debug:
    enabled: true
    time_limit: "04:00:00"    # enough for 8 sequential runs
    cpus: 1
    mem_gb: 8

  # =========================================================
  # Analysis (runs after ALL experiments complete)
  # =========================================================
  models_analyze:
    enabled: true
    methods: "udfs,bingo"
    benchmarks: "nguyen,feynman"
    time_limit: "01:00:00"
    cpus: 1
    mem_gb: 16
