    ops: "+,*,-,/,s,c,e,l,r,^"
    n_strings_per_task: 100000
    max_tokens: 30
    n_shards: 50
    seed_base: 42
    exhaustive_timeout: 10
    time_limit: "04:00:00"
    cpus: 1
    mem_gb: 16

  generate_cache_feynman_3var:
    enabled: true
    num_variables: 3
    ops: "+,*,-,/,s,c,e,l,r,^"
    n_strings_per_task: 100000
    max_tokens: 30
    n_shards: 50
    seed_base: 42
    exhaustive_timeout: 10
    time_limit: "04:00:00"
    cpus: 1
    mem_gb: 16

  merge_cache_nguyen_1var:
    enabled: true
    time_limit: "02:00:00"
    cpus: 1
    mem_gb: 32

  merge_cache_nguyen_2var:
    enabled: true
    time_limit: "02:00:00"
    cpus: 1
    mem_gb: 32

  merge_cache_feynman_1var:
    enabled: true
    time_limit: "02:00:00"
    cpus: 1
    mem_gb: 32

  merge_cache_feynman_2var:
    enabled: true
