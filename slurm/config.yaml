# IsalSR Benchmark Configuration for Picasso HPC
# ===================================================
#
# Central config read by slurm/launch.sh and individual worker scripts.
# Paths assume the Picasso filesystem layout.

# Paths
repo_dir: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/IsalSR
results_dir: /mnt/home/users/tic_163_uma/mpascual/execs/isalsr
conda_env: isalsr

# SLURM defaults
constraint: cpu           # Any CPU node (Picasso recommended default)
account: tic_163_uma

# Per-experiment configuration
# Each experiment runs 30 independent runs (seeds 42..71) across 12 Nguyen benchmarks.
# Canon vs nocanon are separate jobs for paired comparison.
experiments:
  search_space_analysis:
    enabled: true
    n_strings: 10000
    max_tokens: 30
    seed: 42
    time_limit: "08:00:00"
    cpus: 1
    mem_gb: 16

  # --- Random Search: WITH canonicalization ---
  # Array job: each task runs 1 of 30 independent runs.
  # Time limit is PER TASK (single run), not total.
  random_search_canon:
    enabled: true
    n_iterations: 5000
    max_tokens: 30
    n_runs: 30
    seed_base: 42
    use_canonical: true
    time_limit: "02:00:00"    # per task (was 04:00:00 for 30 sequential)
    cpus: 1
    mem_gb: 8

  # --- Random Search: WITHOUT canonicalization (baseline) ---
  random_search_nocanon:
    enabled: true
    n_iterations: 5000
    max_tokens: 30
    n_runs: 30
    seed_base: 42
    use_canonical: false
    time_limit: "01:00:00"    # per task (was 02:00:00 for 30 sequential)
    cpus: 1
    mem_gb: 8

  # --- Hill Climbing: WITH canonicalization ---
  hill_climbing_canon:
    enabled: true
    n_iterations: 1000
    n_restarts: 10
    max_tokens: 30
    n_runs: 30
    seed_base: 42
    time_limit: "02:00:00"    # per task (was 08:00:00 for 30 sequential)
    cpus: 1
    mem_gb: 8

  # --- Hill Climbing: WITHOUT canonicalization ---
  hill_climbing_nocanon:
    enabled: true
    n_iterations: 1000
    n_restarts: 10
    max_tokens: 30
    n_runs: 30
    seed_base: 42
    time_limit: "01:00:00"    # per task (was 04:00:00 for 30 sequential)
    cpus: 1
    mem_gb: 8

  # --- Evolutionary (GP): WITH canonicalization ---
  gp_canon:
    enabled: true
    pop_size: 100
    n_generations: 50
    max_tokens: 30
    mutation_rate: 0.3
    crossover_rate: 0.7
    n_runs: 30
    seed_base: 42
    time_limit: "04:00:00"    # per task (was 12:00:00 for 30 sequential)
    cpus: 1
    mem_gb: 16

  # --- Evolutionary (GP): WITHOUT canonicalization ---
  gp_nocanon:
    enabled: true
    pop_size: 100
    n_generations: 50
    max_tokens: 30
    mutation_rate: 0.3
    crossover_rate: 0.7
    n_runs: 30
    seed_base: 42
    time_limit: "02:00:00"    # per task (was 06:00:00 for 30 sequential)
    cpus: 1
    mem_gb: 16

  # --- Post-processing: aggregate all results ---
  aggregate_results:
    enabled: true
    time_limit: "01:00:00"
    cpus: 1
    mem_gb: 8

  # =================================================================
  # Precomputed Canonical String Cache (Phase 2: sampled generation)
  # =================================================================
  # Each array task generates one shard of random IsalSR strings,
  # computes all 4 D2S algorithms + timing + correctness, and saves
  # to an HDF5 file. A follow-up merge job combines shards.
  #
  # Usage:
  #   bash slurm/launch.sh --experiment generate_cache_nguyen_1var
  #   # After array completes:
  #   bash slurm/launch.sh --experiment merge_cache_nguyen_1var

  # --- Nguyen 1-variable cache ---
  generate_cache_nguyen_1var:
    enabled: true
    num_variables: 1
    ops: "+,*,-,/,s,c,e,l"         # 8 core Nguyen ops
    n_strings_per_task: 50000
    max_tokens: 30
    n_shards: 20                   # array size
    seed_base: 42
    exhaustive_timeout: 60
    time_limit: "08:00:00"
    cpus: 1
    mem_gb: 16

  # --- Nguyen 2-variable cache ---
  generate_cache_nguyen_2var:
    enabled: true
    num_variables: 2
    ops: "+,*,-,/,s,c,e,l"
    n_strings_per_task: 50000
    max_tokens: 30
    n_shards: 20
    seed_base: 42
    exhaustive_timeout: 60
    time_limit: "08:00:00"
    cpus: 1
    mem_gb: 16

  # --- Feynman 1-variable cache ---
  generate_cache_feynman_1var:
    enabled: true
    num_variables: 1
    ops: "+,*,-,/,s,c,e,l,r,^"    # 10 Feynman ops (adds sqrt, pow)
    n_strings_per_task: 25000
    max_tokens: 30
    n_shards: 20
    seed_base: 42
    exhaustive_timeout: 60
    time_limit: "08:00:00"
    cpus: 1
    mem_gb: 16

  # --- Feynman 2-variable cache ---
  generate_cache_feynman_2var:
    enabled: true
    num_variables: 2
    ops: "+,*,-,/,s,c,e,l,r,^"
    n_strings_per_task: 25000
    max_tokens: 30
    n_shards: 20
    seed_base: 42
    exhaustive_timeout: 60
    time_limit: "08:00:00"
    cpus: 1
    mem_gb: 16

  # --- Feynman 3-variable cache ---
  generate_cache_feynman_3var:
    enabled: true
    num_variables: 3
    ops: "+,*,-,/,s,c,e,l,r,^"
    n_strings_per_task: 25000
    max_tokens: 30
    n_shards: 20
    seed_base: 42
    exhaustive_timeout: 60
    time_limit: "08:00:00"
    cpus: 1
    mem_gb: 16

  # --- Merge jobs (run AFTER the corresponding generate_cache array) ---
  merge_cache_nguyen_1var:
    enabled: true
    time_limit: "02:00:00"
    cpus: 1
    mem_gb: 32

  merge_cache_nguyen_2var:
    enabled: true
    time_limit: "02:00:00"
    cpus: 1
    mem_gb: 32

  merge_cache_feynman_1var:
    enabled: true
    time_limit: "02:00:00"
    cpus: 1
    mem_gb: 32

  merge_cache_feynman_2var:
    enabled: true
    time_limit: "02:00:00"
    cpus: 1
    mem_gb: 32

  merge_cache_feynman_3var:
    enabled: true
    time_limit: "02:00:00"
    cpus: 1
    mem_gb: 32
