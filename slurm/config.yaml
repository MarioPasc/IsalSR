# IsalSR Benchmark Configuration for Picasso HPC
# ===================================================
#
# Central config read by slurm/launch.sh and individual worker scripts.
# Paths assume the Picasso filesystem layout.

# Paths
repo_dir: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/IsalSR
results_dir: /mnt/home/users/tic_163_uma/mpascual/execs/isalsr
conda_env: isalsr

# SLURM defaults
constraint: cpu           # Any CPU node (Picasso recommended default)
account: tic_163_uma

# =================================================================
# arXiv Experiments (active)
# =================================================================
# These experiments validate the canonical string representation
# without comparing against other SR methods.

experiments:
  # --- Experiment 4: Search Space Reduction (enhanced) ---
  # Single job. Generates random strings, canonicalizes, measures O(k!) reduction.
  search_space_analysis:
    enabled: true
    n_strings: 10000
    max_tokens_list: "10,15,20,25,30"
    include_feynman: true
    seed: 42
    time_limit: "12:00:00"
    cpus: 1
    mem_gb: 16

  # --- Experiment 3: Canonicalization Time vs Nodes ---
  # Array job: one task per n_internal value (1..max_nodes).
  # Each task runs all num_vars={1,2,3} for that n_internal.
  exp3_canonicalization_time:
    enabled: true
    min_nodes: 1
    max_nodes: 15
    samples_per_node: 200
    timeout: 120
    seed: 42
    time_limit: "08:00:00"    # per array task
    cpus: 1
    mem_gb: 8
    n_runs: 15                # array size = max_nodes

  # --- Experiment 5: Pruning Accuracy ---
  # Array job: one task per n_internal value (1..max_nodes).
  # Compares exhaustive vs pruned canonicalization.
  exp5_pruning_accuracy:
    enabled: true
    min_nodes: 1
    max_nodes: 12
    samples_per_node: 500
    timeout: 60
    seed: 42
    time_limit: "12:00:00"    # per array task (exhaustive is slow for large k)
    cpus: 1
    mem_gb: 8
    n_runs: 12                # array size = max_nodes

  # --- Experiment 6: String Compression ---
  # Single job. Measures string length before/after canonicalization.
  exp6_string_compression:
    enabled: true
    n_strings: 10000
    max_tokens: 30
    seed: 42
    time_limit: "04:00:00"
    cpus: 1
    mem_gb: 8

  # --- Post-processing: aggregate arXiv results ---
  analyze_arxiv:
    enabled: true
    time_limit: "01:00:00"
    cpus: 1
    mem_gb: 16

  # =================================================================
  # Precomputed Canonical String Cache (DISABLED for arXiv)
  # =================================================================
  # These are used for model-based experiments (UDFS, Bingo).
  # Re-enable when running comparative experiments via models_launch.sh.

  generate_cache_nguyen_1var:
    enabled: false
    num_variables: 1
    ops: "+,*,-,/,s,c,e,l"
    n_strings_per_task: 50000
    max_tokens: 30
    n_shards: 20
    seed_base: 42
    exhaustive_timeout: 60
    time_limit: "08:00:00"
    cpus: 1
    mem_gb: 16

  generate_cache_nguyen_2var:
    enabled: false
    num_variables: 2
    ops: "+,*,-,/,s,c,e,l"
    n_strings_per_task: 50000
    max_tokens: 30
    n_shards: 20
    seed_base: 42
    exhaustive_timeout: 60
    time_limit: "08:00:00"
    cpus: 1
    mem_gb: 16

  generate_cache_feynman_1var:
    enabled: false
    num_variables: 1
    ops: "+,*,-,/,s,c,e,l,r,^"
    n_strings_per_task: 25000
    max_tokens: 30
    n_shards: 20
    seed_base: 42
    exhaustive_timeout: 60
    time_limit: "08:00:00"
    cpus: 1
    mem_gb: 16

  generate_cache_feynman_2var:
    enabled: false
    num_variables: 2
    ops: "+,*,-,/,s,c,e,l,r,^"
    n_strings_per_task: 25000
    max_tokens: 30
    n_shards: 20
    seed_base: 42
    exhaustive_timeout: 60
    time_limit: "08:00:00"
    cpus: 1
    mem_gb: 16

  generate_cache_feynman_3var:
    enabled: false
    num_variables: 3
    ops: "+,*,-,/,s,c,e,l,r,^"
    n_strings_per_task: 25000
    max_tokens: 30
    n_shards: 20
    seed_base: 42
    exhaustive_timeout: 60
    time_limit: "08:00:00"
    cpus: 1
    mem_gb: 16

  merge_cache_nguyen_1var:
    enabled: false
    time_limit: "02:00:00"
    cpus: 1
    mem_gb: 32

  merge_cache_nguyen_2var:
    enabled: false
    time_limit: "02:00:00"
    cpus: 1
    mem_gb: 32

  merge_cache_feynman_1var:
    enabled: false
    time_limit: "02:00:00"
    cpus: 1
