# Bingo experiment on Nguyen benchmarks
# Reference: isalsr_experimental_design.md
experiment:
  name: bingo_nguyen
  method: bingo
  n_seeds: 30

benchmarks:
  nguyen:
    problems: all
    train_size: 20
    test_size: 100

bingo:
  population_size: 500
  stack_size: 32
  operators: ["+", "-", "*", "/", "sin", "cos", "exp", "log"]
  use_simplification: false
  crossover_prob: 0.4
  mutation_prob: 0.4
  metric: mse
  clo_alg: lm
  generations: 100000000
  fitness_threshold: 1.0e-16
  max_time: 43200
  max_evals: 100000000
  snapshot_frequency: 10

isalsr:
  canonicalization_timeout: 60.0
  use_fast_canonical: true

output:
  base_dir: /media/mpascual/Sandisk2TB/research/isalsr/results
