# Bingo experiment on Feynman physics benchmarks
# Reference: isalsr_experimental_design.md, data_benchmarking_design.md
# Feynman data: SRBench uses up to 10K; we use 1000/250 (conservative step)
experiment:
  name: bingo_feynman
  method: bingo
  n_seeds: 30

benchmarks:
  feynman:
    problems: all
    train_size: 1000      # 6.25x from Liu2025 (160); toward SRBench std (10K)
    test_size: 250        # 20% holdout from 1250 total

bingo:
  population_size: 500
  stack_size: 32
  operators: ["+", "-", "*", "/", "sin", "cos", "exp", "log"]
  use_simplification: false
  crossover_prob: 0.4
  mutation_prob: 0.4
  metric: mse
  clo_alg: lm
  generations: 100000000
  fitness_threshold: 1.0e-16
  max_time: 43200
  max_evals: 100000000
  snapshot_frequency: 10

isalsr:
  canonicalization_timeout: 60.0
  use_fast_canonical: true

output:
  base_dir: /media/mpascual/Sandisk2TB/research/isalsr/results
