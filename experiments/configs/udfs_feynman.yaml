# UDFS experiment on Feynman physics benchmarks
# Reference: isalsr_experimental_design.md, data_benchmarking_design.md
# Feynman data: SRBench uses up to 10K; we use 1000/250 (conservative step)
experiment:
  name: udfs_feynman
  method: udfs
  n_seeds: 30

benchmarks:
  feynman:
    problems: all
    train_size: 1000      # 6.25x from Liu2025 (160); toward SRBench std (10K)
    test_size: 250        # 20% holdout from 1250 total

udfs:
  # Feynman problems have up to 3 variables; more calc nodes needed
  n_calc_nodes: 7
  max_orders: 200000
  max_time: 43200
  processes: 1
  mode: hierarchical
  k: 2
  stop_thresh: 1.0e-10
  use_tan: false
  # NOTE: operator_set is informational only. The UDFS vendor code uses its own
  # hardcoded operators (including sqrt, but NOT pow). This field is not wired
  # to DAGRegressor and has no effect on execution.
  operator_set: ["+", "*", "-", "/", "sin", "cos", "exp", "log"]
  snapshot_frequency: 1000

isalsr:
  canonicalization_timeout: 60.0
  use_fast_canonical: true

output:
  base_dir: /media/mpascual/Sandisk2TB/research/isalsr/results
