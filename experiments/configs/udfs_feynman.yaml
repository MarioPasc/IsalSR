# UDFS experiment on Feynman physics benchmarks
# Reference: isalsr_experimental_design.md
# Feynman data: Liu2025 Table 2 (200 samples, 80/20 train/test split)
experiment:
  name: udfs_feynman
  method: udfs
  n_seeds: 30

benchmarks:
  feynman:
    problems: all
    train_size: 160
    test_size: 40

udfs:
  # Feynman problems have up to 3 variables; more calc nodes needed
  n_calc_nodes: 7
  max_orders: 200000
  max_time: 3600
  processes: 1
  mode: hierarchical
  k: 2
  stop_thresh: 1.0e-10
  use_tan: false
  # NOTE: operator_set is informational only. The UDFS vendor code uses its own
  # hardcoded operators (including sqrt, but NOT pow). This field is not wired
  # to DAGRegressor and has no effect on execution.
  operator_set: ["+", "*", "-", "/", "sin", "cos", "exp", "log"]

isalsr:
  canonicalization_timeout: 60.0
  use_pruned: true

output:
  base_dir: /media/mpascual/Sandisk2TB/research/isalsr/results
